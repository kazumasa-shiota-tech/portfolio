<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コンタクト</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        nav {
            text-align: center;
            margin: 20px 0;
        }
        nav a {
            text-decoration: none;
            color: #333;
            padding: 10px 15px;
            border-radius: 5px;
            background-color: #efefef;
            margin: 0 5px;
        }
        nav a:hover {
            background-color: #ddd;
        }
        main {
            padding: 0 20px;
        }
        .contact-info {
            list-style: none;
            padding: 0;
        }
        .contact-info li {
            margin-bottom: 10px;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 0.9em;
            color: #777;
        }

</head>
<body>

    <div class="container">
        <header>
            <h1>お問い合わせ</h1>
        </header>

        <nav>
            <a href="index.html">ホーム</a>

        <main>

            <ul class="contact-info">
                <li><strong>Email:</strong> contact@example.com</li>
                <li><strong>電話番号:</strong> 012-345-6789</li>
                <li><strong>住所:</strong> 〒123-4567 東京都千代田区千代田1-1</li>
            </ul>
        </main>

        <footer>
            <p>&copy; 2025 Basic HTML Site</p>
        </footer>
    </div>

</body>
</html>
