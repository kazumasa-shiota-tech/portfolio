<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホームページ</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        nav {
            text-align: center;
            margin: 20px 0;
        }
        nav a {
            text-decoration: none;
            color: #333;
            padding: 10px 15px;
            border-radius: 5px;
            background-color: #efefef;
            margin: 0 5px;
        }
        nav a:hover {
            background-color: #ddd;
        }
        main {
            text-align: center;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ようこそ！</h1>
        </header>

        <nav>
            <a href="index.html">ホーム</a>
            <a href="about.html">アバウト</a>
            <a href="contact.html">コンタクト</a>
        </nav>

        <main>
            <h2>これはホームページです</h2>
            <p>このサイトは基本的なHTMLで作成された3ページのウェブサイトのサンプルです。</p>
            <p>上のナビゲーションリンクを使って、他のページに移動できます。</p>
        </main>

        <footer>
            <p>&copy; 2025 Basic HTML Site</p>
        </footer>
    </div>

</body>
</html>
